name: Morning Market Report

on:
  schedule:
    - cron: "50 3 * * 1-5"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install yfinance requests reportlab matplotlib
      - name: Generate and email report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PWD: ${{ secrets.GMAIL_APP_PWD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python send_report.py
